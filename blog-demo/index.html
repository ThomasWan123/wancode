<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>墨与游 · 小说与游戏的轻博客</title>
  <meta name="description" content="一个发布小说与游戏的轻博客社区" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 顶部导航 -->
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a href="#/" class="brand" aria-label="墨与游 首页">
        <span class="brand-mark">墨<span class="brand-amp">&amp;</span>游</span>
        <span class="brand-sub">小说 × 游戏 · 轻博客</span>
      </a>

      <nav class="nav" id="nav">
        <a href="#/" data-route="home" class="nav-link">首页</a>
        <a href="#/novel" data-route="novel" class="nav-link">小说</a>
        <a href="#/game" data-route="game" class="nav-link">游戏</a>
        <a href="#/publish" data-route="publish" class="nav-link nav-link--cta">发布</a>
      </nav>

      <div class="user-area" id="userArea"></div>
      <button class="menu-toggle" id="menuToggle" aria-label="菜单">☰</button>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="wrap" id="view"></main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="wrap footer-inner">
      <span>© 2026 墨与游 · 本地 Demo</span>
      <span class="footer-tip">数据保存在你的浏览器本地，刷新不丢失</span>
    </div>
  </footer>

  <!-- 登录/注册模态框 -->
  <div class="modal-overlay" id="authModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="authTitle">
      <button class="modal-close" id="authClose" aria-label="关闭">✕</button>
      <div class="tabs">
        <button class="tab tab--active" data-tab="login" id="tabLogin">登录</button>
        <button class="tab" data-tab="register" id="tabRegister">注册</button>
      </div>

      <form class="auth-form" id="loginForm">
        <label class="field">
          <span>用户名</span>
          <input type="text" name="username" autocomplete="username" required minlength="2" placeholder="取一个昵称" />
        </label>
        <label class="field">
          <span>密码</span>
          <input type="password" name="password" autocomplete="current-password" required minlength="4" placeholder="至少 4 位" />
        </label>
        <button type="submit" class="btn btn--primary btn--block">登录</button>
        <p class="auth-hint" id="loginHint"></p>
      </form>

      <form class="auth-form" id="registerForm" hidden>
        <label class="field">
          <span>用户名</span>
          <input type="text" name="username" autocomplete="username" required minlength="2" placeholder="2 位以上" />
        </label>
        <label class="field">
          <span>密码</span>
          <input type="password" name="password" autocomplete="new-password" required minlength="4" placeholder="至少 4 位" />
        </label>
        <label class="field">
          <span>一句话简介（可选）</span>
          <input type="text" name="bio" placeholder="例如：爱写科幻的玩家" />
        </label>
        <button type="submit" class="btn btn--primary btn--block">创建账号</button>
        <p class="auth-hint" id="registerHint"></p>
      </form>
    </div>
  </div>

  <!-- 轻量 toast -->
  <div class="toast" id="toast" hidden></div>

  <script src="js/app.js"></script>
</body>
</html>
